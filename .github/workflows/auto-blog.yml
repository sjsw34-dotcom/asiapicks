name: Auto Blog Post

on:
  schedule:
    # Every day at 21:00 UTC = 06:00 KST (next day)
    - cron: "0 21 * * *"
  workflow_dispatch: # allow manual run from GitHub Actions UI

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Generate blog post ────────────────────────────────────────────
      - name: Generate blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: npx tsx scripts/generate-post.ts

      # ── 5. Check if a new file was created ───────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          git add src/content/blog/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 6. Commit & push (only if a new post was generated) ──────────────
      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "auto: new blog post $(date +%Y-%m-%d)"
          git push

      # ── 7. Wait for Vercel deploy, then ping IndexNow + Google ───────────
      - name: Wait for Vercel deploy
        if: steps.changes.outputs.changed == 'true' && steps.generate.outputs.slug != ''
        run: sleep 180

      - name: Ping IndexNow (Bing / Yandex)
        if: steps.changes.outputs.changed == 'true' && steps.generate.outputs.slug != ''
        env:
          SLUG: ${{ steps.generate.outputs.slug }}
        run: |
          KEY="a3f2e7c8b1d49f6e2c8a4b7d1f3e9c2a"
          POST_URL="https://asiapicks.com/blog/${SLUG}"
          curl -sS -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"asiapicks.com\",\"key\":\"${KEY}\",\"keyLocation\":\"https://asiapicks.com/${KEY}.txt\",\"urlList\":[\"${POST_URL}\",\"https://asiapicks.com/sitemap.xml\"]}" \
            -w "\nIndexNow status: %{http_code}\n" || true

      - name: Ping Google Indexing API + Search Console
        if: steps.changes.outputs.changed == 'true' && steps.generate.outputs.slug != ''
        env:
          SLUG: ${{ steps.generate.outputs.slug }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NEXT_PUBLIC_BASE_URL: https://asiapicks.com
        run: npx tsx scripts/index-new-post.ts
